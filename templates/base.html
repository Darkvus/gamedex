{% load django_vite %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameDex</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='bg' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%237c3aed'/%3E%3Cstop offset='100%25' stop-color='%234f46e5'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='32' fill='url(%23bg)'/%3E%3Crect x='12' y='22' width='40' height='22' rx='11' ry='11' fill='white' opacity='0.95'/%3E%3Crect x='12' y='30' width='10' height='18' rx='5' ry='5' fill='white' opacity='0.95'/%3E%3Crect x='42' y='30' width='10' height='18' rx='5' ry='5' fill='white' opacity='0.95'/%3E%3Crect x='18' y='31' width='10' height='3.5' rx='1.5' fill='%234f46e5'/%3E%3Crect x='21.25' y='28' width='3.5' height='10' rx='1.5' fill='%234f46e5'/%3E%3Ccircle cx='40' cy='30' r='2' fill='%237c3aed'/%3E%3Ccircle cx='44' cy='33.5' r='2' fill='%2306b6d4'/%3E%3Ccircle cx='36' cy='33.5' r='2' fill='%23f59e0b'/%3E%3Ccircle cx='40' cy='37' r='2' fill='%234f46e5'/%3E%3Crect x='29' y='31.5' width='3' height='2.5' rx='1.25' fill='%234f46e5' opacity='0.7'/%3E%3Crect x='32.5' y='31.5' width='3' height='2.5' rx='1.25' fill='%234f46e5' opacity='0.7'/%3E%3C/svg%3E">

  <!-- Apply saved theme before render to avoid flash -->
  <script>
    (function () {
      // RGB tuples for Tailwind opacity modifier support: rgb(R G B / alpha)
      var themes = {
        violet: '124 58 237',
        blue:   '37 99 235',
        cyan:   '6 182 212',
        green:  '16 185 129',
        orange: '249 115 22',
        pink:   '236 72 153',
        red:    '239 68 68',
      };
      var saved = localStorage.getItem('gamedex-theme') || 'violet';
      var rgb = themes[saved] || themes.violet;
      document.documentElement.style.setProperty('--gd-accent-rgb', rgb);
    })();
  </script>

  <style>
    :root { --gd-accent-rgb: 124 58 237; }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'gd-bg':      '#080b14',
            'gd-surface': '#0e1220',
            'gd-card':    '#141824',
            'gd-border':  '#1e2535',
            'gd-accent':  'rgb(var(--gd-accent-rgb) / <alpha-value>)',
            'gd-accent2': '#06b6d4',
            'gd-hot':     '#f59e0b',
            'gd-muted':   '#64748b',
          },
          fontFamily: {
            display: ['Syne', 'sans-serif'],
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  {% vite_hmr_client %}
  {% vite_asset 'frontend/app.js' %}
</head>
<body class="bg-gd-bg text-white min-h-screen antialiased font-sans">
  {% block inertia %}{% endblock %}
</body>
</html>
